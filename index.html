<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glimrede — A Thesaurus of Lost Language</title>
    <meta name="description" content="A writer's instrument for archaic, Early Modern, and Old English vocabulary. Cross-pollinator, kenning forge, and a curated corpus of words that carried something modern language let fall." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #090806; overflow-x: hidden; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: #090806; }
      ::-webkit-scrollbar-thumb { background: #2a1f08; }
      ::-webkit-scrollbar-thumb:hover { background: #3d2e0a; }

      @keyframes phosphorPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.88; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes encounterFlash {
        0% { background: rgba(180,120,10,0.18); }
        100% { background: transparent; }
      }
      @keyframes wordReveal {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .word-glow {
        text-shadow:
          0 0 8px rgba(255,175,30,0.95),
          0 0 24px rgba(240,150,10,0.6),
          0 0 60px rgba(200,110,0,0.25);
      }
      .label-glow {
        text-shadow: 0 0 6px rgba(180,110,10,0.7);
      }
      .dim-glow {
        text-shadow: 0 0 4px rgba(140,85,8,0.5);
      }
      .encounter-flash {
        animation: encounterFlash 0.7s ease-out forwards;
      }
      .word-reveal {
        animation: wordReveal 0.25s ease-out forwards;
      }
      .phosphor-pulse {
        animation: phosphorPulse 4s ease-in-out infinite;
      }
      input::placeholder { color: #2a1e08; }
      input:focus { outline: none; }
      button { cursor: pointer; }
      button:focus { outline: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
